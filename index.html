<!doctype html>
<html lang="en">
  <head>
    <script>
      (function() {
        try {
          var originalFetch = window.fetch;
          if (originalFetch) {
            var customFetch = originalFetch;
            var descriptor = {
              get: function() { return customFetch; },
              set: function(val) { customFetch = val; },
              configurable: true,
              enumerable: true
            };
            try {
              Object.defineProperty(window, 'fetch', descriptor);
            } catch (e1) {
              try {
                Object.defineProperty(Window.prototype, 'fetch', descriptor);
              } catch (e2) {
                console.warn('Failed to define fetch setter/getter on Window.prototype:', e2);
              }
            }
          }
        } catch (e) {
          console.warn('Failed to make window.fetch configurable:', e);
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Icon Listing</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
